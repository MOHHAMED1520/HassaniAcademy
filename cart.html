<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سلة المشتريات | أكاديمية الحساني</title>
  <meta name="description" content="راجع الدورات المختارة، عدل الكميات، وانتقل إلى صفحة التسجيل لإتمام طلبك." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="cart">
  <div id="scrollProgress"></div>
  <header class="topbar" id="topbar">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="assets/logo.jpg" alt="شعار أكاديمية الحساني" class="brand-logo" />
        <div>
          <strong>أكاديمية الحساني للتدريب</strong>
          <span>2026 STEP Store</span>
        </div>
      </a>
      <nav class="main-nav">
        <a href="index.html">الرئيسية</a>
        <a href="courses.html">الدورات</a>
        <a href="cart.html" class="active">السلة <span class="cart-badge" data-cart-count>0</span></a>
      </nav>
    </div>
  </header>

  <main>
    <section class="subhero compact">
      <div class="container subhero-content">
        <span class="eyebrow">🛒 سلة الشراء</span>
        <h1>راجع الدورات المختارة قبل الانتقال للتسجيل</h1>
      </div>
    </section>

    <section class="section-strip">
      <div class="container cart-layout">
        <div class="cart-items-panel" id="cartItems"></div>
        <aside class="order-summary" id="cartSummary"></aside>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <div>
        <strong>أكاديمية الحساني للتدريب</strong>
        <p style="color:var(--muted); margin-top:6px; font-size:0.9rem;">أضف دورة واحدة أو أكثر واجمع السعر تلقائيًا قبل الإرسال للدعم.</p>
      </div>
      <div class="footer-links">
        <a href="courses.html">إضافة دورات</a>
        <a href="checkout.html">إتمام الطلب</a>
      </div>
    </div>
  </footer>

  <button id="ai-chat-btn" title="تحدث مع المساعد الذكي" aria-label="فتح المساعد الذكي">
    🤖
    <span class="chat-notification"></span>
  </button>

  <div id="ai-chat-window" role="dialog" aria-label="المساعد الذكي">
    <div class="chat-header">
      <div class="chat-avatar">🤖</div>
      <div class="chat-header-info">
        <strong>مساعد أكاديمية الحساني</strong>
        <span><span class="status-dot"></span> متصل الآن</span>
      </div>
      <button class="chat-close" id="chatClose" aria-label="إغلاق">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="quick-replies" id="quickReplies"></div>
    <div class="chat-input-area">
      <textarea id="chatInput" placeholder="اكتب سؤالك هنا..." rows="1"></textarea>
      <button id="chatSend" title="إرسال">➤</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
